<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stealth Pacman 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: monospace;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui">
        <h2>Stealth Pacman</h2>
        <p>Controlos: W, A, S, D para mover</p>
        <p>Tecla 'C': Alternar Câmara (Perspetiva/Ortográfica)</p>
        <p>Tecla 'L': Ligar/Desligar Luzes</p>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
